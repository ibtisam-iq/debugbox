# DebugBox Documentation Configuration

site_name: DebugBox
site_author: Muhammad Ibtisam
site_url: https://debugbox.ibtisam-iq.com/
site_description: >
  Lightweight, variant-based debugging container suite
  for Kubernetes and Docker environments.

docs_dir: docs
# Prevents MkDocs from building includes/ as navigable doc pages
exclude_docs: |
  includes/

repo_url: https://github.com/ibtisam-iq/debugbox
repo_name: GitHub

# Use blob (not edit) to encourage PR-based contributions
edit_uri: blob/main/docs/

copyright: Copyright &copy; 2026 DebugBox

theme:
  name: material

  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  language: en

  logo: images/favicon.svg
  favicon: images/favicon.ico

  font:
    text: Inter
    code: JetBrains Mono

  custom_dir: overrides

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.tracking
    - content.action.edit
    - content.tabs.link
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tooltips
    - toc.follow
    - navigation.path
    - content.action.view
    - search.suggest
    - search.highlight
    - search.share
    - announce.dismiss

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.highlight:
      line_spans: __span
      anchor_linenums: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.magiclink
  # base_path must be set explicitly; the default resolves paths from the project root,
  # not docs_dir, causing auto_append lookups to fail silently.
  - pymdownx.snippets:
      base_path: [docs]
      auto_append:
        - includes/abbreviations.md

  # Mermaid diagram support
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      clickable_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - section-index
  - glightbox
  - macros
  - social:
      cards_layout_options:
        background_color: "#283593"
        color: "#ffffff"
  # fallback_to_build_date: false keeps pages without git history from showing the build
  # timestamp as a misleading "last updated" date.
  - git-revision-date-localized:
      type: custom
      custom_format: "%B %d, %Y %I:%M:%S %p"
      enable_creation_date: false
      fallback_to_build_date: false
      timezone: Asia/Karachi
      locale: en

extra:
  generator: false

  analytics:
    provider: google
    property: G-NBK3K2CPEP

  # Mike versioning support
  version:
    provider: mike

  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/ibtisam-iq/
    - icon: fontawesome/brands/github
      link: https://github.com/ibtisam-iq/debugbox
    - icon: personal-site
      link: https://ibtisam-iq.com

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quick-start.md
    - Motivation: getting-started/motivation.md
  - Variants:
    - Overview: variants/overview.md
    - Lite: variants/lite.md
    - Balanced: variants/balanced.md
    - Power: variants/power.md
  - Usage:
    - Docker: usage/docker.md
    - Kubernetes: usage/kubernetes.md
  - Guides:
    - Examples: guides/examples.md
    - Bandwidth Savings: guides/bandwidth-savings.md
    - Troubleshooting & FAQs: guides/troubleshooting.md
  - Reference:
    - Tooling Manifest: reference/manifest.md
    - Multi-Architecture: reference/multi-arch.md
    - Image Tags & Registries: reference/tags.md
  - Development: development/local-setup.md
  - Security: security/policy.md
