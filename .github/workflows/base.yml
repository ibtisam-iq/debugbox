name: Base Image

on:
  push:
    branches:
      - main
    paths:
      - 'dockerfiles/Dockerfile.base'
      - 'dockerfiles/profiles/debugbox-base-profile'
      - '.github/workflows/base.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: ${{ matrix.arch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build base image (${{ matrix.arch }})
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.base
          platforms: linux/${{ matrix.arch }}
          load: true
          push: false
          tags: debugbox-base:ci

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: debugbox-base:ci
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Report size
        run: |
          SIZE_BYTES=$(docker save debugbox-base:ci | gzip -c | wc -c)
          SIZE_MB=$(awk "BEGIN {printf \"%.2f\", $SIZE_BYTES / 1024 / 1024}")
          echo "📦 [${{ matrix.arch }}] base compressed: ${SIZE_MB} MB"

  push:
    name: Push Multi-Arch
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: amd64,arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push base image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: dockerfiles/Dockerfile.base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/ibtisam-iq/debugbox-base:latest
