name: Pages

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for Mike versioning

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}

      - run: pip install -r requirements.txt
      - run: pip install -r requirements-dev.txt

      - name: Build MkDocs site
        run: mkdocs build --strict
        env:
          DISABLE_MKDOCS_2_WARNING: "true"

      # html5validator removed -- this repo is Markdown-only; HTML is generated
      # by MkDocs + Material theme. Validation failures were caused by theme
      # internals (e.g. hidden checkbox <label> associations), not content.

      - name: QA - Check for broken links
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          args: >
            ./site/**/*.html
            --no-progress
            --accept 200,429,403
            --exclude "linkedin\.com"
            --exclude "x\.com"
            --exclude "hub\.docker\.com"
            --exclude "ghcr\.io"
            --exclude "img\.shields\.io"
            --exclude "debugbox\.ibtisam-iq\.com"
            --exclude "example\.com"
            --exclude "dl\.k8s\.io"
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  preview:
    needs: build-and-quality
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - run: pip install -r requirements.txt
      - run: mkdocs build

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source_dir: ./site
          umbrella_dir: previews

  deploy:
    needs: build-and-quality
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
      - run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy frozen version (release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME}"
          echo "Deploying frozen docs for ${VERSION}"
          mike deploy --push --update-aliases "${VERSION}" latest
          mike set-default --push latest
          mike deploy --push dev
          echo "Deployed ${VERSION} and updated 'latest' alias"

      - name: Update dev preview (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Updating dev preview from main"
          mike deploy --push dev
